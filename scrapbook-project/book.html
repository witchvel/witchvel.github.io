<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Journal — The Scrapbook</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="book" id="book">
    <a class="book-home" href="index.html">&larr; Links</a>

    <div class="spread" id="pageStage">
      <!-- leaf images or empty-state injected here by book.js -->
    </div>

    <button class="book-nav prev" id="prevBtn" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <button class="book-nav next" id="nextBtn" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="page-counter" id="pageCounter"></div>

    <div class="chapter-tabs" id="chapterTabs"></div>
  </div>

  <script src="assets/js/book.js"></script>
</body>
</html>
